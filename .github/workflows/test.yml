name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test

  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24

      - name: Install Bun
        # Via Bun's official npm package rather than oven-sh/setup-bun: this
        # repo's Actions policy only allows GitHub-owned actions
        run: npm install -g bun

      - name: Run tests
        # Invoke the file directly: `bun test` would run Bun's own test
        # runner instead of this project's custom one
        run: bun ./test/tests.js

  typecheck:
    name: Type-check definitions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24

      - name: Type-check TypeScript definitions
        run: npm run test:types

  size:
    name: Bundle-size budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24

      - name: Check bundle-size budget
        run: npm run test:size

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 24

      - name: Run benchmark suite
        # Explicit bash shell enables pipefail, so a benchmark failure is not
        # masked by tee's exit code
        shell: bash
        run: node --expose-gc ./benchmark/index.js --all | tee benchmark-output.txt

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo '### Benchmark results'
            echo '```'
            cat benchmark-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
